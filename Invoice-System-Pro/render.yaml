services:
  - type: static
    name: sandro-industrial-frontend
    runtime: node
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile=false && cd artifacts/sandro-industrial && pnpm run build"
    staticPublishPath: "artifacts/sandro-industrial/dist/public"
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "no-cache"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
