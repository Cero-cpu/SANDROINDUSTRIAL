services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sandro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sandro
      POSTGRES_PASSWORD: sandro2024
      POSTGRES_DB: sandro_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sandro -d sandro_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Express API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sandro_api
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://sandro:sandro2024@db:5432/sandro_db
      JWT_SECRET: sandro-industrial-jwt-secret-2024
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (nginx) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sandro_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  # ── DB migrations + seed (runs once and exits) ───────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sandro_migrate
    environment:
      DATABASE_URL: postgresql://sandro:sandro2024@db:5432/sandro_db
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node -e \"
        const { execSync } = require('child_process');
        execSync('npx drizzle-kit push --config ./drizzle.config.ts', { stdio: 'inherit' });
      \""
    profiles:
      - migration

volumes:
  db_data:
